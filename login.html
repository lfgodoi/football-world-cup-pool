<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Bolão Copa 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 350px; text-align: center; transition: all 0.3s ease; }
        h2 { color: #1a2a3a; margin-bottom: 25px; font-weight: 700; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: #27ae60; outline: none; }
        
select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    background: white;
    font-size: 14px;
    color: #333;
}
#register-fields { 
    max-height: 0; 
    overflow: hidden; 
    transition: max-height 0.5s ease-in-out; 
}
#register-fields.active { 
    max-height: 200px; /* Aumentado para caber o select e o input */
}

        button { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; transition: background 0.3s; }
        button:hover { background: #219150; }
        
        .toggle-text { margin-top: 20px; font-size: 14px; color: #666; }
        .toggle-text a { color: #27ae60; text-decoration: none; font-weight: bold; }
        .toggle-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 id="auth-title">🏆 Bolão 2026</h2>
        
        <input type="text" id="username" placeholder="Nome de Usuário">
        <input type="password" id="password" placeholder="Senha">
        
<div id="register-fields">
    <select id="security_question">
        <option value="" disabled selected>Escolha uma pergunta de segurança</option>
        <option value="Nome do seu primeiro pet?">Nome do seu primeiro pet?</option>
        <option value="Cidade onde seus pais se conheceram?">Cidade onde seus pais se conheceram?</option>
        <option value="Nome da sua primeira escola?">Nome da sua primeira escola?</option>
        <option value="Sua comida favorita na infância?">Sua comida favorita na infância?</option>
        <option value="Modelo do seu primeiro carro?">Modelo do seu primeiro carro?</option>
    </select>
    <input type="text" id="security_answer" placeholder="Sua resposta">
</div>

        <button id="auth-btn" type="button" onclick="handleAuth()">Entrar</button>
        
        <p class="toggle-text">
            <span id="toggle-msg">Não tem uma conta?</span> 
            <a href="javascript:void(0)" id="toggle-link" onclick="toggleMode()">Criar conta</a>
        </p>
        
        <p class="toggle-text" id="forgot-password-link" style="display: none;">
            <a href="javascript:void(0)" onclick="showForgotPassword()">Esqueceu a senha?</a>
        </p>
    </div>

    <!-- Modal de Recuperação de Senha -->
    <div id="forgot-modal" class="modal" style="display: none;">
        <div class="auth-card">
            <h2>🔐 Recuperar Senha</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 15px;">
                Digite seu nome de usuário e resposta à pergunta de segurança para criar uma nova senha.
            </p>
            
            <input type="text" id="fp-username" placeholder="Nome de Usuário" onchange="loadSecurityQuestion()">
            <p id="fp-question-display" style="font-size: 14px; color: #333; margin: 10px 0; display: none;"></p>
            <input type="text" id="fp-security-answer" placeholder="Resposta da pergunta de segurança" style="display: none;">
            <input type="password" id="fp-new-password" placeholder="Nova Senha" style="display: none;">
            <input type="password" id="fp-confirm-password" placeholder="Confirmar Nova Senha" style="display: none;">
            
            <button onclick="doForgotPassword()" id="fp-btn" style="display: none;">Alterar Senha</button>
            <button onclick="closeForgotPassword()" style="background: #666; margin-top: 10px;">Cancelar</button>
        </div>
    </div>

<style>
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
</style>

<script>
        const API_URL = 'http://127.0.0.1:8000';
        let isRegisterMode = false;

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const link = document.getElementById('toggle-link');
            const msg = document.getElementById('toggle-msg');
            const regFields = document.getElementById('register-fields');

            if (isRegisterMode) {
                title.innerText = "Novo Cadastro";
                btn.innerText = "Finalizar Cadastro";
                msg.innerText = "Já é cadastrado?";
                link.innerText = "Fazer Login";
                regFields.classList.add('active');
            } else {
                title.innerText = "🏆 Bolão 2026";
                btn.innerText = "Entrar";
                msg.innerText = "Não tem uma conta?";
                link.innerText = "Criar conta";
                regFields.classList.remove('active');
            }
        }

        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Campos de segurança
            const question = document.getElementById('security_question').value;
            const answer = document.getElementById('security_answer') ? document.getElementById('security_answer').value : "";

            if (!user || !pass) return alert("Preencha usuário e senha!");

            if (isRegisterMode) {
                if (!question || !answer) return alert("Escolha uma pergunta e digite a resposta de segurança!");
                await doRegister(user, pass, question, answer);
            } else {
                await doLogin(user, pass);
            }
        }

        function getApiErrorMessage(data, fallback) {
            if (!data) return fallback;
            if (typeof data === 'string') return data;
            if (typeof data.detail === 'string') return data.detail;
            if (Array.isArray(data.detail)) {
                return data.detail.map(item => {
                    if (typeof item === 'string') return item;
                    if (item && item.msg) return item.msg;
                    return JSON.stringify(item);
                }).join(' | ');
            }
            if (data.detail && typeof data.detail === 'object') {
                return data.detail.message || JSON.stringify(data.detail);
            }
            if (data.message) return data.message;
            return JSON.stringify(data);
        }

        function showApiError(data, fallback) {
            const message = getApiErrorMessage(data, fallback);
            alert(typeof message === 'string' ? message : JSON.stringify(message));
        }

        async function doLogin(username, password) {
            console.log('Login payload:', { username, password });
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });

                const text = await response.text();
                console.log('Login response status:', response.status, 'body:', text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch (err) {
                    console.error('Falha ao parsear resposta JSON:', err, text);
                    alert('Erro inesperado no servidor. Veja o console.');
                    return;
                }

                if (response.ok) {
                    const idParaSalvar = data.user_id || data.id;
                    const token = data.token;
                    if (token) {
                        localStorage.setItem('session_token', token);
                    }
                    if (idParaSalvar) {
                        localStorage.setItem('user_id', String(idParaSalvar));
                        localStorage.setItem('user_name', data.name);
                        console.log("Login OK, redirecionando...");
                        window.location.href = "./index.html"; 
                    }
                } else {
                    showApiError(data, "Usuário ou senha inválidos");
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao conectar no servidor!");
            }
        }

        async function doRegister(name, password, security_question, security_answer) {
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        name, 
                        password, 
                        security_question, 
                        security_answer 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Conta criada com sucesso! Agora você já pode entrar.");
                    toggleMode(); // Volta automaticamente para o modo de login
                    // Limpa os campos de segurança para privacidade
                    document.getElementById('security_answer').value = "";
                } else {
                    showApiError(data, "Erro ao criar conta. Tente outro nome de usuário.");
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao conectar no servidor!");
            }
        }

        // --- Funções de Recuperação de Senha ---
        
        function showForgotPassword() {
            document.getElementById('forgot-modal').style.display = 'flex';
            // Limpa os campos
            document.getElementById('fp-username').value = '';
            document.getElementById('fp-security-answer').value = '';
            document.getElementById('fp-new-password').value = '';
            document.getElementById('fp-confirm-password').value = '';
            document.getElementById('fp-question-display').style.display = 'none';
            document.getElementById('fp-security-answer').style.display = 'none';
            document.getElementById('fp-new-password').style.display = 'none';
            document.getElementById('fp-confirm-password').style.display = 'none';
            document.getElementById('fp-btn').style.display = 'none';
        }

        function closeForgotPassword() {
            document.getElementById('forgot-modal').style.display = 'none';
        }

        async function loadSecurityQuestion() {
            const username = document.getElementById('fp-username').value;
            if (!username) return;

            try {
                // Primeiro, busca o usuário para obter a pergunta de segurança
                const response = await fetch(`${API_URL}/users`);
                const users = await response.json();
                
                // Procura o usuário pelo nome
                const user = users.find(u => u.name.toLowerCase() === username.toLowerCase());
                
                if (user) {
                    // Busca os detalhes do usuário com a pergunta
                    const userDetail = await fetch(`${API_URL}/users/${user.id}`);
                    const userData = await userDetail.json();
                    
                    if (userData.security_question) {
                        document.getElementById('fp-question-display').textContent = userData.security_question;
                        document.getElementById('fp-question-display').style.display = 'block';
                        document.getElementById('fp-security-answer').style.display = 'block';
                        document.getElementById('fp-new-password').style.display = 'block';
                        document.getElementById('fp-confirm-password').style.display = 'block';
                        document.getElementById('fp-btn').style.display = 'block';
                    }
                } else {
                    alert("Usuário não encontrado!");
                    document.getElementById('fp-question-display').style.display = 'none';
                    document.getElementById('fp-security-answer').style.display = 'none';
                    document.getElementById('fp-new-password').style.display = 'none';
                    document.getElementById('fp-confirm-password').style.display = 'none';
                    document.getElementById('fp-btn').style.display = 'none';
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao carregar pergunta de segurança!");
            }
        }

        async function doForgotPassword() {
            const username = document.getElementById('fp-username').value;
            const securityAnswer = document.getElementById('fp-security-answer').value;
            const newPassword = document.getElementById('fp-new-password').value;
            const confirmPassword = document.getElementById('fp-confirm-password').value;

            if (!username || !securityAnswer || !newPassword || !confirmPassword) {
                alert("Preencha todos os campos!");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("As senhas não conferem!");
                return;
            }

            if (newPassword.length < 4) {
                alert("A senha deve ter pelo menos 4 caracteres!");
                return;
            }

            try {
                const response = await fetch(`${API_URL}/forgot_password`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        username, 
                        security_answer: securityAnswer,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message || "Senha alterada com sucesso!");
                    closeForgotPassword();
                } else {
                    showApiError(data, "Erro ao alterar senha. Verifique a resposta de segurança.");
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao conectar no servidor!");
            }
        }

        // Controla a visibilidade do link "Esqueceu a senha?"
        function updateForgotPasswordLink() {
            const link = document.getElementById('forgot-password-link');
            if (isRegisterMode) {
                link.style.display = 'none';
            } else {
                link.style.display = 'block';
            }
        }

        // Modifica o toggleMode para também atualizar o link
        const originalToggleMode = toggleMode;
        toggleMode = function() {
            originalToggleMode();
            updateForgotPasswordLink();
        };

        // Inicializa a visibilidade do link
        updateForgotPasswordLink();
    </script>
</body>
</html>
